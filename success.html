<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful | Stitchora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  background:#0b0b0b;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

/* SUCCESS CARD */
.success-box{
  background:#ffffff;
  color:#333;
  padding:40px;
  border-radius:14px;
  text-align:center;
  z-index:2;
  width:90%;
  max-width:420px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.success-box h1{
  color:#2e8b57;
  margin-bottom:10px;
}

.success-box p{
  font-size:16px;
  margin-bottom:25px;
}

.success-box button{
  padding:12px 20px;
  background:#b22222;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

.success-box button:hover{
  background:#8b1a1a;
}

/* FIREWORKS */
.firework{
  position:absolute;
  width:6px;
  height:6px;
  background:transparent;
  border-radius:50%;
  animation:explode 1.2s ease-out infinite;
}

.firework::before,
.firework::after{
  content:"";
  position:absolute;
  width:6px;
  height:6px;
  background:currentColor;
  border-radius:50%;
}

.firework::before{
  transform:translateX(20px);
}
.firework::after{
  transform:translateY(20px);
}

@keyframes explode{
  0%{
    transform:scale(0);
    opacity:1;
  }
  100%{
    transform:scale(12);
    opacity:0;
  }
}

/* COLORS */
.c1{color:#ff3f6c;}
.c2{color:#ffd700;}
.c3{color:#00e5ff;}
.c4{color:#7fff00;}
</style>
</head>

<body>

<!-- FIREWORKS -->
<div class="firework c1" style="top:20%; left:30%"></div>
<div class="firework c2" style="top:30%; left:60%"></div>
<div class="firework c3" style="top:60%; left:40%"></div>
<div class="firework c4" style="top:50%; left:70%"></div>

<!-- SUCCESS MESSAGE -->
<div class="success-box">
  <h1>🎉 Order Successful!</h1>
  <p>Your outfit has been booked successfully.<br>
     Get ready to shine with <b>Stitchora</b> ✨</p>

  <button onclick="goHome()">Back to Home</button>
</div>

<script>
// CLEAR CART AFTER ORDER
localStorage.removeItem("cart");

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
